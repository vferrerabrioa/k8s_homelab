apiVersion: networking.istio.io/v1alpha3
kind: VirtualService
metadata:
  name: kuma-vs
  namespace: monitorizacion
spec:
  hosts:
  - "kuma.172.20.0.127.nip.io"
  gateways:
  - produccion/app-gateway # <--- IMPORTANTE: Apuntamos al gateway que creamos al principio
  http:
  - route:
    - destination:
        host: uptime-kuma-svc.monitorizacion.svc.cluster.local # Nombre completo para evitar errores
        port:
          number: 80